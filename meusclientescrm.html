<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JM Sistemas - CRM de Clientes</title>
    
    <!-- Fonts e Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- CSS do site (reutilizando) -->
    <link rel="stylesheet" href="style.css">
    
    <style>
        /* Estilos específicos do CRM */
        .crm-container {
            max-width: 1400px;
            margin: 100px auto 50px;
            padding: 0 20px;
        }
        
        .crm-header {
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(10px);
            padding: 30px;
            border-radius: 20px;
            margin-bottom: 30px;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }
        
        .crm-header h1 {
            color: white;
            font-size: 2.5rem;
            margin-bottom: 20px;
        }
        
        .btn-crm {
            background: linear-gradient(135deg, #1a56db, #059669);
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 50px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            display: inline-flex;
            align-items: center;
            gap: 10px;
        }
        
        .btn-crm:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 25px rgba(37, 99, 235, 0.3);
        }
        
        .btn-excluir {
            background: linear-gradient(135deg, #dc2626, #b91c1c);
        }
        
        .filtros {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin-bottom: 30px;
        }
        
        .filtros input, .filtros select {
            background: rgba(15, 23, 42, 0.8);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 12px 20px;
            border-radius: 10px;
            color: white;
            font-family: 'Poppins', sans-serif;
        }
        
        .filtros input::placeholder {
            color: #64748b;
        }
        
        .tabela-container {
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 20px;
            border: 1px solid rgba(255, 255, 255, 0.05);
            overflow-x: auto;
        }
        
        table {
            width: 100%;
            border-collapse: collapse;
            color: white;
        }
        
        th {
            background: rgba(15, 23, 42, 0.8);
            padding: 15px;
            font-weight: 600;
            color: #f59e0b;
            text-align: left;
            white-space: nowrap;
        }
        
        td {
            padding: 12px 15px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }
        
        tr:hover {
            background: rgba(255, 255, 255, 0.05);
        }
        
        .status {
            padding: 6px 12px;
            border-radius: 50px;
            font-size: 0.9rem;
            font-weight: 600;
            display: inline-block;
            text-align: center;
            min-width: 100px;
        }
        
        .status-pago {
            background: rgba(16, 185, 129, 0.2);
            color: #10b981;
            border: 1px solid rgba(16, 185, 129, 0.3);
        }
        
        .status-naopago {
            background: rgba(239, 68, 68, 0.2);
            color: #ef4444;
            border: 1px solid rgba(239, 68, 68, 0.3);
        }
        
        .status-ativo {
            background: rgba(16, 185, 129, 0.2);
            color: #10b981;
        }
        
        .status-inativo {
            background: rgba(239, 68, 68, 0.2);
            color: #ef4444;
        }
        
        .status-pendente {
            background: rgba(245, 158, 11, 0.2);
            color: #f59e0b;
        }
        
        .cards-financeiro {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-top: 30px;
        }
        
        .card-financeiro {
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(10px);
            padding: 25px;
            border-radius: 15px;
            border: 1px solid rgba(255, 255, 255, 0.05);
            text-align: center;
        }
        
        .card-financeiro h3 {
            color: #f59e0b;
            font-size: 1rem;
            margin-bottom: 10px;
        }
        
        .card-financeiro .valor {
            color: white;
            font-size: 2rem;
            font-weight: 700;
        }
        
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            z-index: 2000;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        
        .modal.active {
            display: flex;
        }
        
        .modal-content {
            background: #1e293b;
            border-radius: 20px;
            padding: 40px;
            max-width: 800px;
            width: 100%;
            max-height: 90vh;
            overflow-y: auto;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }
        
        .modal-content h2 {
            color: white;
            margin-bottom: 30px;
        }
        
        .form-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 20px;
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        .form-group.full-width {
            grid-column: span 2;
        }
        
        .form-group label {
            display: block;
            color: #cbd5e1;
            margin-bottom: 8px;
            font-size: 0.9rem;
        }
        
        .form-group input, .form-group select {
            width: 100%;
            padding: 12px 15px;
            background: #0f172a;
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            color: white;
            font-family: 'Poppins', sans-serif;
        }
        
        .acoes {
            display: flex;
            gap: 10px;
        }
        
        .btn-editar, .btn-excluir-tabela {
            padding: 5px 10px;
            border-radius: 5px;
            border: none;
            cursor: pointer;
            color: white;
        }
        
        .btn-editar {
            background: #f59e0b;
        }
        
        .btn-excluir-tabela {
            background: #dc2626;
        }

        /* ===== VERSÃO MOBILE RESPONSIVA ===== */
@media screen and (max-width: 768px) {
    .crm-container {
        margin: 80px auto 30px;
        padding: 0 15px;
    }
    
    .crm-header {
        padding: 20px;
    }
    
    .crm-header h1 {
        font-size: 1.8rem;
        text-align: center;
    }
    
    .btn-crm {
        width: 100%;
        justify-content: center;
        padding: 15px;
        font-size: 1rem;
    }
    
    /* Filtros em coluna */
    .filtros {
        grid-template-columns: 1fr;
        gap: 10px;
    }
    
    .filtros input, .filtros select {
        width: 100%;
        padding: 15px;
        font-size: 16px; /* Evita zoom no iOS */
    }
    
    /* Tabela com scroll horizontal */
    .tabela-container {
        padding: 10px;
        margin: 0 -15px;
        border-radius: 0;
        overflow-x: auto;
        -webkit-overflow-scrolling: touch;
    }
    
    table {
        min-width: 1200px; /* Força scroll horizontal */
        font-size: 14px;
    }
    
    th {
        padding: 12px 8px;
        font-size: 13px;
        white-space: nowrap;
    }
    
    td {
        padding: 10px 8px;
        white-space: nowrap;
    }
    
    .status {
        padding: 4px 8px;
        font-size: 12px;
        min-width: 80px;
    }
    
    /* Cards financeiros em grid 2x2 */
    .cards-financeiro {
        grid-template-columns: repeat(2, 1fr);
        gap: 15px;
        margin-top: 20px;
    }
    
    .card-financeiro {
        padding: 15px;
    }
    
    .card-financeiro h3 {
        font-size: 0.9rem;
    }
    
    .card-financeiro .valor {
        font-size: 1.3rem;
    }
    
    /* Modal mobile */
    .modal-content {
        padding: 25px 20px;
        margin: 10px;
        max-height: 85vh;
    }
    
    .modal-content h2 {
        font-size: 1.5rem;
        margin-bottom: 20px;
    }
    
    .form-grid {
        grid-template-columns: 1fr; /* Uma coluna no mobile */
        gap: 15px;
    }
    
    .form-group.full-width {
        grid-column: span 1;
    }
    
    .form-group label {
        font-size: 0.9rem;
        margin-bottom: 5px;
    }
    
    .form-group input, .form-group select {
        padding: 12px;
        font-size: 16px; /* Evita zoom no iOS */
    }
    
    /* Ações da tabela */
    .acoes {
        display: flex;
        gap: 5px;
    }
    
    .btn-editar, .btn-excluir-tabela {
        padding: 8px 12px;
        font-size: 14px;
    }
    
    /* Botão de exportar (se tiver) */
    .btn-exportar {
        width: 100%;
        margin-top: 15px;
    }
}

/* Ajustes para telas muito pequenas */
@media screen and (max-width: 480px) {
    .crm-header h1 {
        font-size: 1.5rem;
    }
    
    .cards-financeiro {
        gap: 10px;
    }
    
    .card-financeiro {
        padding: 12px;
    }
    
    .card-financeiro h3 {
        font-size: 0.8rem;
    }
    
    .card-financeiro .valor {
        font-size: 1.1rem;
    }
    
    .modal-content {
        padding: 20px 15px;
    }
    
    .form-group input, .form-group select {
        padding: 10px;
    }
}

/* Ajuste para landscape (celular deitado) */
@media screen and (max-height: 500px) and (orientation: landscape) {
    .modal-content {
        max-height: 80vh;
        padding: 15px;
    }
    
    .form-grid {
        grid-template-columns: repeat(2, 1fr); /* Volta 2 colunas no landscape */
    }
    
    .cards-financeiro {
        grid-template-columns: repeat(4, 1fr); /* 4 cards lado a lado */
    }
}

/* Melhorias na tabela para mobile */
.tabela-container::-webkit-scrollbar {
    height: 6px;
}

.tabela-container::-webkit-scrollbar-track {
    background: rgba(255, 255, 255, 0.05);
    border-radius: 10px;
}

.tabela-container::-webkit-scrollbar-thumb {
    background: linear-gradient(135deg, #1a56db, #059669);
    border-radius: 10px;
}

/* Loading states (opcional) */
.loading {
    opacity: 0.7;
    pointer-events: none;
    position: relative;
}

.loading:after {
    content: '';
    position: absolute;
    top: 50%;
    left: 50%;
    width: 30px;
    height: 30px;
    margin: -15px 0 0 -15px;
    border: 3px solid rgba(255,255,255,0.3);
    border-top-color: #f59e0b;
    border-radius: 50%;
    animation: spin 1s linear infinite;
}

@keyframes spin {
    to { transform: rotate(360deg); }
}

/* Botão de voltar ao topo (mobile) */
.back-to-top {
    display: none;
    position: fixed;
    bottom: 80px;
    right: 20px;
    width: 45px;
    height: 45px;
    background: linear-gradient(135deg, #1a56db, #059669);
    color: white;
    border-radius: 50%;
    border: none;
    cursor: pointer;
    font-size: 1.2rem;
    box-shadow: 0 5px 15px rgba(0,0,0,0.3);
    z-index: 100;
    opacity: 0;
    transition: opacity 0.3s ease;
}

.back-to-top.visible {
    opacity: 1;
}

@media screen and (max-width: 768px) {
    .back-to-top {
        display: flex;
        align-items: center;
        justify-content: center;
    }
}
    </style>
</head>
<body>
    <!-- Header (igual ao site) -->
    <header>
        <div class="header-container">
            <div class="logo-container">
                <img src="assets/images/logosemfundo.png" alt="JM Sistemas" class="logo">
            </div>
            <nav class="desktop-nav">
                <a href="index.html">Início</a>
                <a href="#clientes">Clientes</a>
                <a href="#financeiro">Financeiro</a>
            </nav>
        </div>
    </header>

    <div class="crm-container">
        <!-- Cabeçalho -->
        <div class="crm-header">
            <h1><i class="fas fa-users"></i> Gestão de Clientes - CRM</h1>
            <button class="btn-crm" onclick="abrirModal()">
                <i class="fas fa-plus"></i> Novo Cliente
            </button>
        </div>

        <!-- Filtros -->
        <div class="filtros">
            <input type="text" id="filtroNome" placeholder="Buscar por nome..." onkeyup="filtrarClientes()">
            <select id="filtroStatus" onchange="filtrarClientes()">
                <option value="">Todos os status</option>
                <option value="pago">Pago</option>
                <option value="naopago">Não Pago</option>
            </select>
            <select id="filtroAtivo" onchange="filtrarClientes()">
                <option value="">Todos os ativos</option>
                <option value="sim">Ativo</option>
                <option value="nao">Inativo</option>
                <option value="falta">Falta Instalar</option>
            </select>
        </div>

        <!-- Tabela -->
        <div class="tabela-container">
            <table id="tabelaClientes">
                <thead>
                    <tr>
                        <th>Código</th>
                        <th>Nome</th>
                        <th>CPF/CNPJ</th>
                        <th>Telefone</th>
                        <th>Email</th>
                        <th>Sistema</th>
                        <th>V. Licença</th>
                        <th>V. Mensal</th>
                        <th>Vencimento</th>
                        <th>Status Pago</th>
                        <th>Regime</th>
                        <th>Qtd Máq</th>
                        <th>Ativo</th>
                        <th>Responsável</th>
                        <th>Ações</th>
                    </tr>
                </thead>
                <tbody id="corpoTabela">
                </tbody>
            </table>
        </div>

        <!-- Cards Financeiros -->
        <div class="cards-financeiro">
            <div class="card-financeiro">
                <h3>Total Licenças</h3>
                <div class="valor" id="totalLicencas">R$ 0,00</div>
            </div>
            <div class="card-financeiro">
                <h3>Total Mensal</h3>
                <div class="valor" id="totalMensal">R$ 0,00</div>
            </div>
            <div class="card-financeiro">
                <h3>Recebido</h3>
                <div class="valor" id="totalRecebido">R$ 0,00</div>
            </div>
            <div class="card-financeiro">
                <h3>Pendente</h3>
                <div class="valor" id="totalPendente">R$ 0,00</div>
            </div>
        </div>
    </div>

    <!-- Modal de Cadastro -->
    <div class="modal" id="modalCliente">
        <div class="modal-content">
            <h2 id="modalTitulo">Novo Cliente</h2>
            <form id="formCliente" onsubmit="salvarCliente(event)">
                <input type="hidden" id="clienteId">
                
                <div class="form-grid">
                    <div class="form-group">
                        <label>Código:</label>
                        <input type="text" id="codigo" readonly>
                    </div>
                    
                    <div class="form-group">
                        <label>Nome *:</label>
                        <input type="text" id="nome" required>
                    </div>
                    
                    <div class="form-group">
                        <label>CPF/CNPJ *:</label>
                        <input type="text" id="cpf" required>
                    </div>
                    
                    <div class="form-group">
                        <label>Endereço:</label>
                        <input type="text" id="endereco">
                    </div>
                    
                    <div class="form-group">
                        <label>Telefone *:</label>
                        <input type="text" id="telefone" required>
                    </div>
                    
                    <div class="form-group">
                        <label>Email:</label>
                        <input type="email" id="email">
                    </div>
                    
                    <div class="form-group">
                        <label>Tipo Sistema:</label>
                        <select id="tipoSistema">
                            <option value="ERP Completo">ERP Completo</option>
                            <option value="PDV">PDV</option>
                            <option value="Delivery">Delivery</option>
                            <option value="Fiscal">Fiscal</option>
                        </select>
                    </div>
                    
                    <div class="form-group">
                        <label>Valor Licença (R$):</label>
                        <input type="number" id="valorLicenca" step="0.01" value="0">
                    </div>
                    
                    <div class="form-group">
                        <label>Valor Mensal (R$):</label>
                        <input type="number" id="valorMensal" step="0.01" value="0">
                    </div>
                    
                    <div class="form-group">
                        <label>Vencimento:</label>
                        <input type="date" id="vencimento">
                    </div>
                    
                    <div class="form-group">
                        <label>Pago:</label>
                        <select id="pago">
                            <option value="nao">Não</option>
                            <option value="sim">Sim</option>
                        </select>
                    </div>
                    
                    <div class="form-group">
                        <label>Regime Tributário:</label>
                        <select id="regime">
                            <option value="Simples Nacional">Simples Nacional</option>
                            <option value="MEI">MEI</option>
                            <option value="Lucro Presumido">Lucro Presumido</option>
                            <option value="Lucro Real">Lucro Real</option>
                        </select>
                    </div>
                    
                    <div class="form-group">
                        <label>Qtd Máquinas:</label>
                        <input type="number" id="qtdMaquinas" value="1">
                    </div>
                    
                    <div class="form-group">
                        <label>Ativo:</label>
                        <select id="ativo">
                            <option value="sim">Sim</option>
                            <option value="nao">Não</option>
                            <option value="falta">Falta Instalar</option>
                        </select>
                    </div>
                    
                    <div class="form-group full-width">
                        <label>Responsável:</label>
                        <input type="text" id="responsavel">
                    </div>
                </div>
                
                <div style="display: flex; gap: 10px; justify-content: flex-end; margin-top: 20px;">
                    <button type="button" class="btn-crm" onclick="fecharModal()" style="background: #64748b;">Cancelar</button>
                    <button type="submit" class="btn-crm">Salvar</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        // Banco de dados
        let clientes = [];

        // Inicialização
        document.addEventListener('DOMContentLoaded', function() {
            carregarClientes();
            atualizarTabela();
            verificarVencimentoMensal();
        });

        // Gerar código automático
        function gerarCodigo() {
            if (clientes.length === 0) return 1;
            return Math.max(...clientes.map(c => c.codigo)) + 1;
        }

        // Abrir modal de cadastro
        function abrirModal(cliente = null) {
            document.getElementById('modalCliente').classList.add('active');
            
            if (cliente) {
                document.getElementById('modalTitulo').textContent = 'Editar Cliente';
                document.getElementById('clienteId').value = cliente.id;
                document.getElementById('codigo').value = cliente.codigo;
                document.getElementById('nome').value = cliente.nome;
                document.getElementById('cpf').value = cliente.cpf;
                document.getElementById('endereco').value = cliente.endereco || '';
                document.getElementById('telefone').value = cliente.telefone;
                document.getElementById('email').value = cliente.email || '';
                document.getElementById('tipoSistema').value = cliente.tipoSistema || 'ERP Completo';
                document.getElementById('valorLicenca').value = cliente.valorLicenca || 0;
                document.getElementById('valorMensal').value = cliente.valorMensal || 0;
                document.getElementById('vencimento').value = cliente.vencimento || '';
                document.getElementById('pago').value = cliente.pago || 'nao';
                document.getElementById('regime').value = cliente.regime || 'Simples Nacional';
                document.getElementById('qtdMaquinas').value = cliente.qtdMaquinas || 1;
                document.getElementById('ativo').value = cliente.ativo || 'sim';
                document.getElementById('responsavel').value = cliente.responsavel || '';
            } else {
                document.getElementById('modalTitulo').textContent = 'Novo Cliente';
                document.getElementById('clienteId').value = '';
                document.getElementById('codigo').value = gerarCodigo();
                document.getElementById('formCliente').reset();
            }
        }

        function fecharModal() {
            document.getElementById('modalCliente').classList.remove('active');
        }

        // Salvar cliente
        function salvarCliente(event) {
            event.preventDefault();
            
            const cliente = {
                id: document.getElementById('clienteId').value || Date.now().toString(),
                codigo: parseInt(document.getElementById('codigo').value),
                nome: document.getElementById('nome').value,
                cpf: document.getElementById('cpf').value,
                endereco: document.getElementById('endereco').value,
                telefone: document.getElementById('telefone').value,
                email: document.getElementById('email').value,
                tipoSistema: document.getElementById('tipoSistema').value,
                valorLicenca: parseFloat(document.getElementById('valorLicenca').value) || 0,
                valorMensal: parseFloat(document.getElementById('valorMensal').value) || 0,
                vencimento: document.getElementById('vencimento').value,
                pago: document.getElementById('pago').value,
                regime: document.getElementById('regime').value,
                qtdMaquinas: parseInt(document.getElementById('qtdMaquinas').value) || 1,
                ativo: document.getElementById('ativo').value,
                responsavel: document.getElementById('responsavel').value
            };

            if (document.getElementById('clienteId').value) {
                // Editar
                const index = clientes.findIndex(c => c.id === cliente.id);
                if (index !== -1) clientes[index] = cliente;
            } else {
                // Novo
                clientes.push(cliente);
            }

            salvarClientes();
            atualizarTabela();
            fecharModal();
        }

        // Excluir cliente
        function excluirCliente(id) {
            if (confirm('Tem certeza que deseja excluir este cliente?')) {
                clientes = clientes.filter(c => c.id !== id);
                salvarClientes();
                atualizarTabela();
            }
        }

        // Editar cliente
        function editarCliente(id) {
            const cliente = clientes.find(c => c.id === id);
            if (cliente) abrirModal(cliente);
        }

        // Atualizar tabela
        function atualizarTabela() {
            const corpo = document.getElementById('corpoTabela');
            corpo.innerHTML = '';
            
            let totalLicencas = 0;
            let totalMensal = 0;
            let totalRecebido = 0;
            
            clientes.forEach(cliente => {
                totalLicencas += cliente.valorLicenca;
                totalMensal += cliente.valorMensal;
                if (cliente.pago === 'sim') totalRecebido += cliente.valorMensal;
                
                const row = corpo.insertRow();
                row.innerHTML = `
                    <td>${cliente.codigo}</td>
                    <td>${cliente.nome}</td>
                    <td>${cliente.cpf}</td>
                    <td>${cliente.telefone}</td>
                    <td>${cliente.email || '-'}</td>
                    <td>${cliente.tipoSistema}</td>
                    <td>R$ ${cliente.valorLicenca.toFixed(2)}</td>
                    <td>R$ ${cliente.valorMensal.toFixed(2)}</td>
                    <td>${cliente.vencimento || '-'}</td>
                    <td><span class="status ${cliente.pago === 'sim' ? 'status-pago' : 'status-naopago'}">${cliente.pago === 'sim' ? 'PAGO' : 'NÃO PAGO'}</span></td>
                    <td>${cliente.regime}</td>
                    <td>${cliente.qtdMaquinas}</td>
                    <td><span class="status ${cliente.ativo === 'sim' ? 'status-ativo' : cliente.ativo === 'nao' ? 'status-inativo' : 'status-pendente'}">${cliente.ativo === 'sim' ? 'ATIVO' : cliente.ativo === 'nao' ? 'INATIVO' : 'FALTA INSTALAR'}</span></td>
                    <td>${cliente.responsavel || '-'}</td>
                    <td class="acoes">
                        <button class="btn-editar" onclick="editarCliente('${cliente.id}')"><i class="fas fa-edit"></i></button>
                        <button class="btn-excluir-tabela" onclick="excluirCliente('${cliente.id}')"><i class="fas fa-trash"></i></button>
                    </td>
                `;
            });
            
            document.getElementById('totalLicencas').textContent = `R$ ${totalLicencas.toFixed(2)}`;
            document.getElementById('totalMensal').textContent = `R$ ${totalMensal.toFixed(2)}`;
            document.getElementById('totalRecebido').textContent = `R$ ${totalRecebido.toFixed(2)}`;
            document.getElementById('totalPendente').textContent = `R$ ${(totalMensal - totalRecebido).toFixed(2)}`;
        }

        // Filtrar clientes
        function filtrarClientes() {
            const filtroNome = document.getElementById('filtroNome').value.toLowerCase();
            const filtroStatus = document.getElementById('filtroStatus').value;
            const filtroAtivo = document.getElementById('filtroAtivo').value;
            
            const corpo = document.getElementById('corpoTabela');
            corpo.innerHTML = '';
            
            let totalLicencas = 0;
            let totalMensal = 0;
            let totalRecebido = 0;
            
            clientes.forEach(cliente => {
                if (filtroNome && !cliente.nome.toLowerCase().includes(filtroNome)) return;
                if (filtroStatus && cliente.pago !== filtroStatus) return;
                if (filtroAtivo && cliente.ativo !== filtroAtivo) return;
                
                totalLicencas += cliente.valorLicenca;
                totalMensal += cliente.valorMensal;
                if (cliente.pago === 'sim') totalRecebido += cliente.valorMensal;
                
                const row = corpo.insertRow();
                row.innerHTML = `
                    <td>${cliente.codigo}</td>
                    <td>${cliente.nome}</td>
                    <td>${cliente.cpf}</td>
                    <td>${cliente.telefone}</td>
                    <td>${cliente.email || '-'}</td>
                    <td>${cliente.tipoSistema}</td>
                    <td>R$ ${cliente.valorLicenca.toFixed(2)}</td>
                    <td>R$ ${cliente.valorMensal.toFixed(2)}</td>
                    <td>${cliente.vencimento || '-'}</td>
                    <td><span class="status ${cliente.pago === 'sim' ? 'status-pago' : 'status-naopago'}">${cliente.pago === 'sim' ? 'PAGO' : 'NÃO PAGO'}</span></td>
                    <td>${cliente.regime}</td>
                    <td>${cliente.qtdMaquinas}</td>
                    <td><span class="status ${cliente.ativo === 'sim' ? 'status-ativo' : cliente.ativo === 'nao' ? 'status-inativo' : 'status-pendente'}">${cliente.ativo === 'sim' ? 'ATIVO' : cliente.ativo === 'nao' ? 'INATIVO' : 'FALTA INSTALAR'}</span></td>
                    <td>${cliente.responsavel || '-'}</td>
                    <td class="acoes">
                        <button class="btn-editar" onclick="editarCliente('${cliente.id}')"><i class="fas fa-edit"></i></button>
                        <button class="btn-excluir-tabela" onclick="excluirCliente('${cliente.id}')"><i class="fas fa-trash"></i></button>
                    </td>
                `;
            });
            
            document.getElementById('totalLicencas').textContent = `R$ ${totalLicencas.toFixed(2)}`;
            document.getElementById('totalMensal').textContent = `R$ ${totalMensal.toFixed(2)}`;
            document.getElementById('totalRecebido').textContent = `R$ ${totalRecebido.toFixed(2)}`;
            document.getElementById('totalPendente').textContent = `R$ ${(totalMensal - totalRecebido).toFixed(2)}`;
        }

        // Verificar vencimento mensal (resetar pago)
        function verificarVencimentoMensal() {
            const hoje = new Date();
            const ultimaVerificacao = localStorage.getItem('ultimaVerificacao');
            
            if (ultimaVerificacao) {
                const ultima = new Date(ultimaVerificacao);
                if (hoje.getMonth() !== ultima.getMonth() || hoje.getFullYear() !== ultima.getFullYear()) {
                    // Mudou o mês, resetar pagamentos
                    clientes.forEach(c => c.pago = 'nao');
                    salvarClientes();
                    atualizarTabela();
                }
            }
            
            localStorage.setItem('ultimaVerificacao', hoje.toISOString());
        }

        // Salvar no localStorage
        function salvarClientes() {
            localStorage.setItem('crmClientes', JSON.stringify(clientes));
        }

        // Carregar do localStorage
        function carregarClientes() {
            const dados = localStorage.getItem('crmClientes');
            if (dados) {
                clientes = JSON.parse(dados);
            } else {
                // Dados de exemplo
                clientes = [
                    {
                        id: '1',
                        codigo: 1,
                        nome: 'Empresa Exemplo 1',
                        cpf: '12.345.678/0001-90',
                        telefone: '(82) 98888-7777',
                        tipoSistema: 'ERP Completo',
                        valorLicenca: 5000,
                        valorMensal: 800,
                        pago: 'sim',
                        ativo: 'sim',
                        regime: 'Simples Nacional',
                        qtdMaquinas: 3
                    },
                    {
                        id: '2',
                        codigo: 2,
                        nome: 'Empresa Exemplo 2',
                        cpf: '98.765.432/0001-10',
                        telefone: '(82) 99999-8888',
                        tipoSistema: 'PDV',
                        valorLicenca: 3000,
                        valorMensal: 500,
                        pago: 'nao',
                        ativo: 'falta',
                        regime: 'MEI',
                        qtdMaquinas: 1
                    }
                ];
            }
        }

        // Verificar vencimento a cada hora
        setInterval(verificarVencimentoMensal, 3600000);
    </script>
